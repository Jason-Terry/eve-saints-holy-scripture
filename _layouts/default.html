<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="templar-cross">&#10013;</div>
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <p class="site-subtitle">{{ site.description }}</p>
    </div>
  </header>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}">Home</a>
      <span class="nav-divider">&#10013;</span>
      <a href="{{ '/Doctrine/01%20-%20PvE%20Doctrine' | relative_url }}">PvE</a>
      <a href="{{ '/Doctrine/02%20-%20PvP%20Home%20Defense' | relative_url }}">Home Defense</a>
      <a href="{{ '/Doctrine/PvP%20Hunting' | relative_url }}">Hunting</a>
      <span class="nav-divider">&#10013;</span>
      <a href="{{ '/Corp%20Info/About' | relative_url }}">About</a>
      <a href="{{ '/Corp%20Info/Allies' | relative_url }}">Allies</a>
    </div>
  </nav>

  <main class="content">
    <article class="page-content">
      {{ content }}
    </article>
  </main>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const contentDiv = document.querySelector('.page-content');
    if (!contentDiv) return;

    const pages = [
      {%- for p in site.pages -%}
        {%- if p.title and p.url contains '.html' or p.name contains '.md' -%}
          { title: {{ p.title | jsonify }}, url: "{{ site.baseurl }}{{ p.url | replace: '.html', '' }}" },
        {%- endif -%}
      {%- endfor -%}
    ];

    function findPage(title) {
      return pages.find(p => p.title.toLowerCase() === title.toLowerCase())
          || pages.find(p => p.url.toLowerCase().endsWith('/' + title.toLowerCase().replace(/ /g, '%20')));
    }

    function processNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        let el = node.parentElement;
        while (el) {
          if (el.tagName === 'CODE' || el.tagName === 'PRE') return;
          el = el.parentElement;
        }
        const text = node.textContent;
        const re = /\[\[([^\]]+)\]\]/g;
        let match, last = 0, frags = [];
        while ((match = re.exec(text)) !== null) {
          if (match.index > last)
            frags.push(document.createTextNode(text.slice(last, match.index)));
          const linkText = match[1].includes('|') ? match[1].split('|')[1] : match[1];
          const target = match[1].includes('|') ? match[1].split('|')[0] : match[1];
          const found = findPage(target);
          const a = document.createElement('a');
          a.textContent = linkText;
          if (found) {
            a.href = found.url;
            a.className = 'wiki-link';
          } else {
            a.href = 'javascript:void(0)';
            a.className = 'stale-link';
            a.title = 'Page not yet written: ' + target;
          }
          frags.push(a);
          last = match.index + match[0].length;
        }
        if (frags.length > 0) {
          if (last < text.length)
            frags.push(document.createTextNode(text.slice(last)));
          frags.forEach(f => node.parentNode.insertBefore(f, node));
          node.parentNode.removeChild(node);
        }
      } else if (node.nodeType === Node.ELEMENT_NODE) {
        Array.from(node.childNodes).forEach(c => processNode(c));
      }
    }

    processNode(contentDiv);
  });
  </script>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="templar-cross">&#10013;</div>
      <p>The-Saints [SAYNT] &mdash; C3 Wormhole</p>
      <p class="footer-motto">Repent and believe in the gospel.</p>
    </div>
  </footer>
</body>
</html>

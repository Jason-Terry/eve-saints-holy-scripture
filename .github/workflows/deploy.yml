name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert wiki links and add front matter
        run: |
          python3 << 'SCRIPT'
          import os, re, glob

          # Map of known pages: display name -> relative path (without .md)
          page_map = {}
          for md in glob.glob('**/*.md', recursive=True):
              if md.startswith(('.', '_')):
                  continue
              name = os.path.splitext(os.path.basename(md))[0]
              path = '/' + os.path.splitext(md)[0]
              page_map[name] = path

          for md in glob.glob('**/*.md', recursive=True):
              if md.startswith(('.', '_')):
                  continue

              with open(md, 'r') as f:
                  content = f.read()

              # Extract title from first H1 if present
              title_match = re.match(r'^#\s+(.+)$', content, re.MULTILINE)
              title = title_match.group(1) if title_match else os.path.splitext(os.path.basename(md))[0]

              # Add front matter if missing
              if not content.startswith('---'):
                  front_matter = f'---\nlayout: default\ntitle: "{title}"\n---\n\n'
                  content = front_matter + content

              # Convert [[wiki links]] to markdown links
              def replace_wiki_link(match):
                  link_text = match.group(1)
                  # Handle [[Page|Display Text]] format
                  if '|' in link_text:
                      target, display = link_text.split('|', 1)
                  else:
                      target = link_text
                      display = link_text

                  target = target.strip()
                  display = display.strip()

                  if target in page_map:
                      return f'[{display}]({{% link {page_map[target][1:]}.md %}})'
                  else:
                      return f'*{display}*'

              content = re.sub(r'\[\[([^\]]+)\]\]', replace_wiki_link, content)

              with open(md, 'w') as f:
                  f.write(content)

          print(f"Processed {len(page_map)} pages")
          print(f"Page map: {page_map}")
          SCRIPT

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Jekyll
        run: |
          gem install jekyll bundler
          gem install kramdown-parser-gfm

      - name: Build site
        run: jekyll build
        env:
          JEKYLL_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

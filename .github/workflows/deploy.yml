name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add front matter to markdown files
        run: |
          python3 << 'SCRIPT'
          import os, re, pathlib

          for md in pathlib.Path('.').rglob('*.md'):
              md = str(md)
              # Skip hidden dirs, Jekyll dirs, Home.md
              if any(part.startswith(('.', '_')) for part in md.split(os.sep)):
                  continue
              if md == 'Home.md':
                  continue

              with open(md, 'r') as f:
                  content = f.read()

              # Skip if front matter already exists
              if content.startswith('---'):
                  print(f"Skipped (has front matter): {md}")
                  continue

              # Extract title from first H1
              title_match = re.search(r'^#\s+(.+)$', content, re.MULTILINE)
              title = title_match.group(1) if title_match else os.path.splitext(os.path.basename(md))[0]

              # Add front matter
              front_matter = f'---\nlayout: default\ntitle: "{title}"\n---\n\n'
              content = front_matter + content

              with open(md, 'w') as f:
                  f.write(content)

              print(f"Added front matter: {md} -> {title}")
          SCRIPT

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Jekyll
        run: |
          gem install jekyll bundler
          gem install kramdown-parser-gfm

      - name: Build site
        run: jekyll build
        env:
          JEKYLL_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
